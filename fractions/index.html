<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractions Practice</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?version=3.4.4"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>

    <!-- MathRenderer -->
    <script src="js/renderer.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: '#3B82F6',
              secondary: '#2563EB',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm px-6 py-4 flex items-center justify-between no-print">
        <div class="flex items-center space-x-4">
            <a href="../" class="text-gray-500 hover:text-gray-700">&larr; Hub</a>
            <h1 class="text-xl font-bold text-primary">Fractions Practice</h1>
        </div>
        <div class="flex space-x-2">
            <button id="tab-interactive" class="px-4 py-2 rounded-md bg-indigo-50 text-indigo-700 font-medium border border-indigo-500 transition">Interactive Solver</button>
            <button id="tab-worksheet" class="px-4 py-2 rounded-md bg-white text-gray-500 border border-transparent font-medium hover:bg-gray-50 hover:text-gray-700 transition">Worksheets</button>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="max-w-6xl mx-auto mt-8 p-4 space-y-6">
        
        <!-- INTERACTIVE MODE -->
        <div id="interactive-workspace" class="space-y-6">
            <div id="config-interactive" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 no-print">
                <h2 class="text-lg font-bold text-gray-800 mb-4">Problem Config</h2>
                <div class="flex flex-col md:flex-row md:items-center gap-6 mb-6">
                    <div class="w-full md:w-48">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Topic</label>
                        <select id="config-topic" class="w-full border border-gray-300 rounded-md p-2 focus:ring-primary focus:border-primary">
                            <option value="concepts">Core Concepts</option>
                            <option value="addsub" selected>Add / Subtract</option>
                            <option value="multiply">Multiply</option>
                            <option value="divide">Divide</option>
                        </select>
                    </div>
                    <div class="w-full md:w-48" id="config-fraction-type-container">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fraction Type</label>
                        <select id="config-fraction-type" class="w-full border border-gray-300 rounded-md p-2 focus:ring-primary focus:border-primary">
                            <option value="proper" selected>Proper Fractions</option>
                            <option value="mixed">Mixed / Improper</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-center gap-4 pt-4 border-t border-gray-100">
                    <button id="btn-generate-fractions" class="bg-primary text-white font-semibold py-2.5 px-6 rounded-md hover:bg-secondary transition shadow-sm">
                        Generate Problem
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Solver Workspace -->
                <div class="lg:col-span-2 space-y-6 flex flex-col">
                    <div class="bg-white rounded-xl shadow-md border-t-4 border-primary p-6 relative flex-grow min-h-[400px] flex items-center justify-center overflow-x-auto">
                        <div class="mb-6 flex justify-center items-start gap-8 w-full">
                            <!-- Math Grid -->
                            <div id="fractions-math-display" class="text-3xl text-gray-800 font-medium whitespace-nowrap min-h-[4rem] flex items-center"></div>
                            
                            <!-- Visual Explanation Container -->
                            <div id="visual-explanation-container" class="w-64 bg-gray-200 rounded-lg p-4 border border-gray-300 hidden opacity-0 transition-all duration-500 shadow-inner flex-shrink-0">
                                <div class="flex items-center justify-between mb-3">
                                    <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Visual Explanation</h3>
                                     <div class="flex items-center space-x-1 text-[10px] text-gray-500 font-semibold">
                                        <span id="anim-speed-display">3.0s</span>
                                        <input type="range" id="anim-speed" min="1" max="10" step="0.5" value="3" class="w-10 h-1 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-gray-500">
                                    </div>
                                </div>
                                <div id="visual-explanation-display" class="bg-white rounded p-3 shadow-sm text-center overflow-x-auto min-h-[5rem] flex items-center justify-center text-xl font-medium text-gray-800"></div>
                                <!-- Playback Controls -->
                                <div class="flex items-center justify-center space-x-1.5 mt-3 text-[10px]">
                                    <button id="btn-anim-prev" class="px-2 py-1 bg-white hover:bg-gray-50 text-gray-600 rounded border border-gray-200 font-semibold transition">&larr;</button>
                                    <button id="btn-anim-next" class="px-2 py-1 bg-white hover:bg-gray-50 text-gray-600 rounded border border-gray-200 font-semibold transition">&rarr;</button>
                                    <span id="anim-frame-counter" class="text-gray-500 font-mono font-bold bg-white border border-gray-200 rounded px-1.5 py-0.5">1/1</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                        <label class="block text-sm font-semibold text-gray-600 uppercase tracking-wider mb-2 text-center">Enter your step here (Press Tab for hint)</label>
                        <input type="text" id="fractions-step-input" placeholder="..." class="w-full text-center text-xl p-4 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-mono" autocomplete="off">
                        <div id="fractions-step-error" class="text-red-500 text-sm mt-2 text-center hidden font-medium"></div>
                    </div>
                </div>

                <!-- Hints Panel -->
                <div class="lg:col-span-1">
                    <div class="bg-yellow-50 rounded-xl shadow-sm border border-yellow-200 p-6 h-full sticky top-6">
                        <h3 class="font-bold text-yellow-800 mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Hint / Objective
                        </h3>
                        <div id="fractions-hint-content" class="text-yellow-900 leading-relaxed text-sm"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- WORKSHEET MODE -->
        <div id="worksheet-workspace" class="hidden space-y-6">
            <div id="config-worksheet" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 no-print hidden">
                <h2 class="text-lg font-bold text-gray-800 mb-4">Worksheet Settings</h2>
                <div class="flex flex-col md:flex-row md:items-center gap-6 mb-6">
                    <div class="w-full md:w-48">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Topic</label>
                        <select id="ws-topic" class="w-full border border-gray-300 rounded-md p-2 focus:ring-primary focus:border-primary">
                            <option value="concepts">Core Concepts</option>
                            <option value="addsub" selected>Add / Subtract</option>
                            <option value="multiply">Multiply</option>
                            <option value="divide">Divide</option>
                        </select>
                    </div>
                    <div class="w-full md:w-48" id="ws-fraction-type-container">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fraction Type</label>
                        <select id="ws-fraction-type" class="w-full border border-gray-300 rounded-md p-2 focus:ring-primary focus:border-primary">
                            <option value="proper" selected>Proper Fractions</option>
                            <option value="mixed">Mixed / Improper</option>
                        </select>
                    </div>
                    <div class="w-full md:w-48">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Number of Problems</label>
                        <select id="ws-num-problems" class="w-full border border-gray-300 rounded-md p-2 focus:ring-primary focus:border-primary">
                            <option value="5">5</option>
                            <option value="10" selected>10 (1 Page)</option>
                            <option value="15">15</option>
                            <option value="20">20 (2 Pages)</option>
                            <option value="30">30 (3 Pages)</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-center gap-4 pt-4 border-t border-gray-100">
                    <button id="btn-generate-worksheet" class="bg-primary text-white font-semibold py-2.5 px-6 rounded-md hover:bg-secondary transition shadow-sm">
                        Generate Worksheet
                    </button>
                    <button id="btn-print-worksheet" onclick="window.print()" class="bg-white border border-gray-300 text-gray-700 font-semibold py-2.5 px-6 rounded-md hover:bg-gray-50 transition shadow-sm hidden">
                        Print Worksheet
                    </button>
                </div>
            </div>
            
            <!-- Printable Worksheet Document Wrapper -->
            <div id="worksheet-document" class="space-y-8 bg-white border shadow-sm print:shadow-none print:border-none min-h-[10.5in]">
                <!-- Document pages injected dynamically -->
            </div>
        </div>

    </main>

    <footer class="text-center py-8 text-gray-500 text-sm mt-auto no-print">
        &copy; Kids School Helpers
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
