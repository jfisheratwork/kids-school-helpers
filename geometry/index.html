<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Foundations</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?version=3.4.4"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>

    <!-- MathRenderer (reusing from pre-algebra) -->
    <script src="../pre-algebra-solver/js/renderer.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: '#10B981', // Emerald 500 for Geometry
              secondary: '#059669', // Emerald 600
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Slow transition for animations */
        html.slow-transition ::view-transition-group(*) {
            animation-duration: var(--transition-duration, 3s);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm px-6 py-4 flex items-center justify-between no-print">
        <div class="flex items-center space-x-4">
            <a href="../" class="text-gray-500 hover:text-gray-700">&larr; Hub</a>
            <h1 class="text-xl font-bold text-primary">Geometry Foundations</h1>
        </div>
        <div class="flex space-x-2">
            <button id="tab-interactive" class="px-4 py-2 rounded-md bg-emerald-50 text-emerald-700 border border-emerald-500 font-medium transition">Interactive Solver</button>
            <button id="tab-worksheet" class="px-4 py-2 rounded-md bg-white text-gray-700 border border-transparent font-medium hover:text-gray-700 hover:border-gray-300 transition">Worksheets</button>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="max-w-6xl mx-auto mt-8 p-4 space-y-6">
        
        <!-- Collapsible Guide Drawer -->
        <details id="guide-geometry" class="bg-emerald-50 border border-emerald-100 rounded-xl overflow-hidden group no-print">
            <summary class="flex items-center justify-between p-4 font-semibold text-emerald-900 cursor-pointer hover:bg-emerald-100/50 transition select-none list-none">
                <span class="flex items-center space-x-2">
                    <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    <span id="guide-geometry-title">Geometry Reference</span>
                </span>
                <span class="transition-transform duration-200 group-open:rotate-180">
                    <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </span>
            </summary>
            <div id="guide-geometry-content" class="p-6 bg-white border-t border-emerald-100/50 text-sm text-gray-700 space-y-3">
                <!-- Injected dynamically -->
            </div>
        </details>

        <!-- INTERACTIVE SOLVER MODE -->
        <div id="interactive-workspace" class="space-y-6">
            <!-- Config Panel -->
            <div id="config-interactive" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 no-print">
                <h2 class="text-lg font-bold text-gray-800 mb-4">Problem Config</h2>
                <div class="flex flex-col md:flex-row md:items-center gap-6 mb-6">
                    <div class="w-full md:w-64">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Topic</label>
                        <select id="config-topic" class="w-full border border-gray-300 rounded-md p-2 focus:ring-primary focus:border-primary">
                            <option value="area" selected>Area & Perimeter</option>
                            <option value="volume">Volume & Surface Area</option>
                            <option value="angles">Missing Angles</option>
                            <option value="pythagorean">Pythagorean Theorem</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-center gap-4 pt-4 border-t border-gray-100">
                    <button id="btn-generate-geometry" class="bg-primary text-white font-semibold py-2.5 px-6 rounded-md hover:bg-secondary transition shadow-sm">
                        Generate Problem
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Solver Workspace -->
                <div class="lg:col-span-2 space-y-6 flex flex-col">
                    <div class="bg-white rounded-xl shadow-md border-t-4 border-primary p-6 relative flex-grow min-h-[450px] flex flex-col items-center justify-start overflow-hidden">
                        
                        <!-- Shape SVG Container -->
                        <div id="shape-visual-container" class="w-full h-48 md:h-64 flex items-center justify-center mb-6">
                            <!-- Procedural SVG injected here -->
                        </div>

                        <!-- Interactive Math Layout -->
                        <div class="flex flex-col md:flex-row justify-center items-start gap-8 w-full">
                            <!-- Math Equation Grid -->
                            <div id="geometry-math-display" class="text-2xl md:text-3xl text-gray-800 font-medium whitespace-nowrap min-h-[4rem] flex flex-col items-center">
                                <!-- Steps appended here -->
                            </div>
                            
                            <!-- Visual Explanation Container -->
                            <div id="visual-explanation-container" class="w-64 bg-gray-200 rounded-lg p-4 border border-gray-300 hidden opacity-0 transition-all duration-500 shadow-inner flex-shrink-0">
                                <div class="flex items-center justify-between mb-3">
                                    <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Formula Evaluation</h3>
                                     <div class="flex items-center space-x-1 text-[10px] text-gray-500 font-semibold">
                                        <span id="anim-speed-display">3.0s</span>
                                        <input type="range" id="anim-speed" min="1" max="10" step="0.5" value="3" class="w-10 h-1 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-gray-500">
                                    </div>
                                </div>
                                <div id="visual-explanation-display" class="bg-white rounded p-3 shadow-sm text-center overflow-x-auto min-h-[5rem] flex items-center justify-center text-xl font-medium text-gray-800"></div>
                                <!-- Playback Controls -->
                                <div class="flex items-center justify-center space-x-1.5 mt-3 text-[10px]">
                                    <button id="btn-anim-prev" class="px-2 py-1 bg-white hover:bg-gray-50 text-gray-600 rounded border border-gray-200 font-semibold transition">&larr;</button>
                                    <button id="btn-anim-next" class="px-2 py-1 bg-white hover:bg-gray-50 text-gray-600 rounded border border-gray-200 font-semibold transition">&rarr;</button>
                                    <span id="anim-frame-counter" class="text-gray-500 font-mono font-bold bg-white border border-gray-200 rounded px-1.5 py-0.5">1/1</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                        <label class="block text-sm font-semibold text-gray-600 uppercase tracking-wider mb-2 text-center">Enter your step here (Press Tab for hint)</label>
                        <input type="text" id="geometry-step-input" placeholder="..." class="w-full text-center text-xl p-4 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-mono" autocomplete="off">
                        <div id="geometry-step-error" class="text-red-500 text-sm mt-2 text-center hidden font-medium"></div>
                    </div>
                </div>

                <!-- Hints Panel -->
                <div class="lg:col-span-1">
                    <div class="bg-emerald-50 rounded-xl shadow-sm border border-emerald-100 p-6 sticky top-8 transition-all duration-300">
                        <div class="flex items-center space-x-2 mb-4">
                            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <h2 class="text-sm font-bold text-emerald-800 uppercase tracking-wider">Objectives & Hints</h2>
                        </div>
                        <div id="geometry-hint-content" class="text-emerald-900 space-y-4 text-sm leading-relaxed">
                            Generate a problem to begin.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- WORKSHEET MODE -->
        <div id="worksheet-workspace" class="hidden space-y-6">
            <div id="config-worksheet" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 no-print">
                <h2 class="text-lg font-bold text-gray-800 mb-4">Worksheet Settings</h2>
                <div class="flex flex-col gap-6 mb-6">
                    <div class="flex flex-col md:flex-row md:items-center gap-6">
                        <div class="w-full md:w-64">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Topic</label>
                            <select id="ws-topic" class="w-full border border-gray-300 rounded-md p-2 focus:ring-primary focus:border-primary">
                                <option value="area" selected>Area & Perimeter</option>
                                <option value="volume">Volume & Surface Area</option>
                                <option value="angles">Missing Angles</option>
                                <option value="pythagorean">Pythagorean Theorem</option>
                            </select>
                        </div>
                        <div class="w-full md:w-64">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Number of Problems</label>
                            <select id="ws-num-problems" class="w-full border border-gray-300 rounded-md p-2 focus:ring-primary focus:border-primary">
                                <option value="2">2</option>
                                <option value="4">4</option>
                                <option value="6" selected>6 (1 Page)</option>
                                <option value="8">8</option>
                                <option value="10">10</option>
                                <option value="12">12 (2 Pages)</option>
                                <option value="18">18 (3 Pages)</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Advanced Options (Visible for Area & Perimeter) -->
                    <div id="ws-advanced-options" class="flex flex-col md:flex-row gap-8 p-4 bg-gray-50 rounded-lg border border-gray-200">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Included Shapes</label>
                            <div class="flex flex-col space-y-2">
                                <label class="inline-flex items-center">
                                    <input type="checkbox" class="form-checkbox text-primary rounded border-gray-300 focus:ring-primary h-4 w-4" value="rect" id="chk-shape-rect" checked>
                                    <span class="ml-2 text-sm text-gray-700">Rectangle</span>
                                </label>
                                <label class="inline-flex items-center">
                                    <input type="checkbox" class="form-checkbox text-primary rounded border-gray-300 focus:ring-primary h-4 w-4" value="triangle" id="chk-shape-triangle" checked>
                                    <span class="ml-2 text-sm text-gray-700">Triangle</span>
                                </label>
                                <label class="inline-flex items-center">
                                    <input type="checkbox" class="form-checkbox text-primary rounded border-gray-300 focus:ring-primary h-4 w-4" value="circle" id="chk-shape-circle" checked>
                                    <span class="ml-2 text-sm text-gray-700">Circle</span>
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Calculations</label>
                            <div class="flex flex-col space-y-2">
                                <label class="inline-flex items-center">
                                    <input type="checkbox" class="form-checkbox text-primary rounded border-gray-300 focus:ring-primary h-4 w-4" value="area" id="chk-calc-area" checked>
                                    <span class="ml-2 text-sm text-gray-700">Area</span>
                                </label>
                                <label class="inline-flex items-center">
                                    <input type="checkbox" class="form-checkbox text-primary rounded border-gray-300 focus:ring-primary h-4 w-4" value="perimeter" id="chk-calc-perimeter" checked>
                                    <span class="ml-2 text-sm text-gray-700">Perimeter / Circumference</span>
                                </label>
                                <label class="inline-flex items-center">
                                    <input type="checkbox" class="form-checkbox text-primary rounded border-gray-300 focus:ring-primary h-4 w-4" value="diameter" id="chk-calc-diameter" checked>
                                    <span class="ml-2 text-sm text-gray-700">Diameter (Circles only)</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-4 pt-4 border-t border-gray-100">
                    <button id="btn-generate-worksheet" class="bg-primary text-white font-semibold py-2.5 px-6 rounded-md hover:bg-secondary transition shadow-sm">
                        Generate Worksheet
                    </button>
                    <button id="btn-print-worksheet" class="bg-white text-gray-700 border border-gray-300 font-semibold py-2.5 px-6 rounded-md hover:bg-gray-50 transition shadow-sm hidden" onclick="window.print()">
                        Print Worksheet
                    </button>
                </div>
            </div>

            <!-- Printable Worksheet Document Wrapper -->
            <div id="worksheet-document" class="space-y-8 bg-white border shadow-sm print:shadow-none print:border-none min-h-[10.5in]">
                <!-- Document pages injected dynamically -->
            </div>
        </div>

    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
